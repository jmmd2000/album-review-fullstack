# Production compose (traefik + GHCR)
name: ${APP_NAME}

services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_USER}/album-backend:${IMAGE_TAG}
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4000
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
      - web_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_proxy"
      - "traefik.http.routers.${APP_NAME}-backend.rule=(Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.${APP_NAME}-backend.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-backend.tls.certresolver=myresolver"
      - "traefik.http.routers.${APP_NAME}-backend-ws.rule=(Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && PathPrefix(`/ws`)"
      - "traefik.http.routers.${APP_NAME}-backend-ws.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-backend-ws.tls.certresolver=myresolver"

  frontend:
    image: ghcr.io/${GITHUB_USER}/album-frontend:${IMAGE_TAG}
    restart: always
    depends_on:
      - backend
    networks:
      - app_network
      - web_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_proxy"
      - "traefik.http.routers.${APP_NAME}-frontend.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}-frontend.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-frontend.tls.certresolver=myresolver"

networks:
  app_network:
  web_proxy:
    external: true

volumes:
  pgdata:
    driver: local
