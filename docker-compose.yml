# Production compose (traefik + GHCR)
name: ${APP_NAME}

services:
  db:
    image: postgres:15
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-off migration runner, invoked at deploy time via `docker compose run --rm migrate`.
  # Behind a profile so it never starts with `up`, and it uses no traefik labels so it
  # never joins the router while migrations run.
  migrate:
    image: ghcr.io/${GITHUB_USER}/album-api:${IMAGE_TAG}
    profiles: ["migrate"]
    command:
      [
        "./node_modules/.bin/drizzle-kit",
        "migrate",
        "--config",
        "/app/dist/apps/api/drizzle.config.js",
      ]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  api:
    image: ghcr.io/${GITHUB_USER}/album-api:${IMAGE_TAG}
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4000
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      BROWSERLESS_URL: ws://browserless:3000
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1:4000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app_network
      - web_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_proxy"
      - "traefik.http.routers.${APP_NAME}-api.rule=(Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.${APP_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-api.tls.certresolver=myresolver"

  # Chromium sidecar for the artist header scraper. The api connects to it over
  # websocket with the token, internal network only, nothing routes through traefik.
  browserless:
    image: ghcr.io/browserless/chromium:latest
    restart: always
    environment:
      TOKEN: ${BROWSERLESS_TOKEN}
      # Matches the scraper's old batch size, anything beyond it queues inside browserless
      CONCURRENT: 6
      # Per-session cap in ms, a header page scrape is well under this
      TIMEOUT: 60000
    mem_limit: 2g
    networks:
      - app_network

  web:
    image: ghcr.io/${GITHUB_USER}/album-web:${IMAGE_TAG}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app_network
      - web_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web_proxy"
      - "traefik.http.routers.${APP_NAME}-web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.${APP_NAME}-web.entrypoints=websecure"
      - "traefik.http.routers.${APP_NAME}-web.tls.certresolver=myresolver"

networks:
  app_network:
  web_proxy:
    external: true

volumes:
  pgdata:
    driver: local
