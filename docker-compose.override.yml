# Docker Compose configuration for development
# docker-compose up
services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev # Use the dev specific Dockerfile
    volumes:
      - ./apps/api/src:/app/src # mount only the source code for live reload
      - ./apps/api/package.json:/app/package.json # keep package.json updated
      - ./packages/shared:/shared # mount shared code
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml
      - ./pnpm-lock.yaml:/pnpm-lock.yaml
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
    ports:
      - "4000:4000"
    command: pnpm run dev # use nodemon for live reload

  browserless:
    environment:
      TOKEN: ${BROWSERLESS_TOKEN:-dev-token} # fixed fallback so dev boots without a .env entry
    ports:
      - "3000:3000" # browserless debugger UI

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev # Use the dev specific Dockerfile
    volumes:
      - ./apps/web/src:/app/src # mount source code for live reload
      - ./apps/web/public:/app/public # Mount public assets
      - ./packages/shared:/app/shared # mount shared code
      - ./pnpm-workspace.yaml:/pnpm-workspace.yaml
      - ./pnpm-lock.yaml:/pnpm-lock.yaml
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensure file changes are detected in Docker
      - VITE_API_URL=http://localhost:4000
    ports:
      - "5173:5173"
    command: pnpm run dev
    depends_on:
      - api
